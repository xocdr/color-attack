<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascend — Battle</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }

    /* ── UI overlay ──────────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Field drop zone (full play area above the hand) ────────────────────── */
    #field-drop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 130px;
      pointer-events: none;
      z-index: 15;
    }
    #field-drop.dragging {
      pointer-events: all;
    }
    #field-drop.drag-over {
      background: rgba(0, 255, 255, 0.04);
      outline: 2px dashed rgba(0, 255, 255, 0.25);
      outline-offset: -16px;
    }

    /* ── Hand container ──────────────────────────────────────────────────────── */
    #hand {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      pointer-events: all;
    }

    /* ── Individual card ─────────────────────────────────────────────────────── */
    .card {
      width: 4.5rem;
      height: 6.5rem;
      background: linear-gradient(160deg, #1e1e38 0%, #12122a 100%);
      border: 1.5px solid #3a3a6a;
      border-radius: 8px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #7777bb;
      font-family: sans-serif;
      font-size: 0.65rem;
      text-align: center;
      user-select: none;
    }
    .card + .card { margin-left: -1.4rem; }
    .card-icon { font-size: 1.6rem; opacity: 0.7; }
    .card-name { font-size: 0.6rem; color: #9999cc; letter-spacing: 0.03em; }
    .card-cost {
      position: absolute;
      top: 6px; left: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #00ccff;
    }
    .card-atk {
      position: absolute;
      bottom: 5px; right: 7px;
      font-size: 0.6rem;
      font-weight: bold;
      color: #e84d6a;
      opacity: 0.9;
    }
    .card:hover {
      transform: translateY(-18px) scale(1.08);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0, 180, 255, 0.35);
      border-color: #6688ff;
    }
    .card.dragging {
      opacity: 0.4;
      transform: translateY(-18px) scale(1.05);
      cursor: grabbing;
    }

    /* ── Deck (right side) ───────────────────────────────────────────────────── */
    #deck {
      position: fixed;
      bottom: 32px;
      right: 28px;
      width: 4.5rem;
      height: 6.5rem;
      pointer-events: all;
      cursor: pointer;
      z-index: 30;
    }
    .deck-card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('src/card-img/back.png') center/cover no-repeat;
      border: 1.5px solid #3a3a6a;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    /* stacked card offsets — bottom to top */
    .deck-card:nth-child(1) { transform: translate(4px, 4px); }
    .deck-card:nth-child(2) { transform: translate(2px, 2px); }
    .deck-card:nth-child(3) {
      transform: translateY(0);
      transition: transform 0.2s ease, border-color 0.2s ease, filter 0.2s ease;
    }
    .deck-count {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 0.6rem;
      color: #5566aa;
      font-family: sans-serif;
      font-weight: bold;
    }
    @keyframes deckTopPulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(120,140,255,0.5)); }
      50%       { filter: drop-shadow(0 0 18px rgba(160,100,255,0.9)); }
    }
    #deck:hover .deck-card:nth-child(3) {
      transform: translateY(-14px);
      border-color: #aa88ff;
      animation: deckTopPulse 0.9s ease-in-out infinite;
    }

    /* ── Turn / mana HUD ──────────────────────────────────────────────────────── */
    #turn-hud {
      position: fixed;
      bottom: 34px;
      right: 190px;
      display: flex;
      align-items: center;
      gap: 16px;
      pointer-events: all;
      z-index: 25;
    }
    #mana-dots { display: flex; gap: 6px; }
    .mana-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: rgba(30,144,255,0.2);
      transition: background 0.15s, box-shadow 0.15s;
    }
    .mana-dot.filled {
      background: #1E90FF;
      box-shadow: 0 0 8px rgba(30,144,255,0.9);
    }
    #end-turn-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7px 20px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,200,80,0.4);
      background: #c87800;
      color: #fff8e0;
      font-family: sans-serif;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s, background 0.15s, border-color 0.15s;
    }
    #end-turn-btn:hover:not(:disabled) {
      filter: brightness(1.15);
      border-color: #ffe066;
    }
    #end-turn-btn:active:not(:disabled) { transform: scale(0.96); }
    #end-turn-btn:disabled {
      background: #3a3a3a;
      border-color: rgba(255,255,255,0.12);
      color: #888;
      cursor: default;
      filter: none;
    }
    #turn-badge { font-size: 0.6rem; opacity: 0.8; letter-spacing: 0.04em; }
    #end-turn-label { font-size: 0.78rem; font-weight: bold; letter-spacing: 0.04em; }

    /* Cards that can't be afforded this turn */
    .card.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.6);
    }
    .card.unaffordable:hover { transform: none; box-shadow: none; }

    /* Scene switcher */
    #scene-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .scene-btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.55);
      color: #aaddcc;
      font-family: sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .scene-btn:hover {
      background: rgba(0,0,0,0.8);
      border-color: rgba(255,255,255,0.35);
      color: #ffffff;
    }
    .scene-btn.active {
      border-color: #44ffaa;
      color: #44ffaa;
      background: rgba(0,40,20,0.7);
    }

    /* Cinematic vignette */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.45) 80%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Deal animation — card slides up from below */
    @keyframes dealCard {
      from { transform: translateY(60px) scale(0.7); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }
    .card.dealing {
      animation: dealCard 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Floating damage numbers */
    .enemy-hp-bar {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #ff5555;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid rgba(255,60,60,0.4);
      white-space: nowrap;
    }

    .player-hp-bar {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      transform: translateX(-50%);
      background: linear-gradient(160deg, #1e1e38 0%, #12122a 100%);
      color: #4deca8;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1.5px solid rgba(60,255,140,0.45);
      box-shadow: 0 0 8px rgba(60,255,140,0.25);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .status-bar {
      position: fixed;
      pointer-events: none;
      z-index: 90;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
    }
    .status-badge {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: linear-gradient(160deg, #1e1e38 0%, #12122a 100%);
      border-radius: 8px;
      padding: 1px 5px;
      font-size: 0.62rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-badge.buff   { border: 1px solid rgba(60,255,140,0.5);  color: #8effc4; box-shadow: 0 0 5px rgba(60,255,140,0.25); }
    .status-badge.debuff { border: 1px solid rgba(255,80,80,0.5);   color: #ff9a9a; box-shadow: 0 0 5px rgba(255,60,60,0.25); }
    .status-badge .stacks   { font-size: 0.55rem; opacity: 0.85; }
    .status-badge .duration { font-size: 0.55rem; opacity: 0.7; margin-left: 1px; }

    .dmg-number {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 2rem;
      font-weight: 900;
      color: #ff2222;
      text-shadow: 0 0 10px #ff0000, 0 2px 6px #000;
      transform: translateX(-50%);
      animation: dmgFloat 1s ease-out forwards;
    }
    @keyframes dmgFloat {
      0%   { transform: translateX(-50%) translateY(0);     opacity: 1; }
      100% { transform: translateX(-50%) translateY(-70px); opacity: 0; }
    }

    /* ── Card detail popup (TCG-style hover panel) ───────────────────────────── */
    #card-detail {
      position: fixed;
      width: 210px;
      pointer-events: none;
      z-index: 50;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(170deg, #12122e 0%, #0a0a1e 100%);
      border: 1.5px solid var(--rarity-color, #3a3a6a);
      border-radius: 10px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        0 12px 40px rgba(0,0,0,0.75),
        0 0 24px color-mix(in srgb, var(--rarity-color, #3a3a6a) 40%, transparent);
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      transition: opacity 0.15s ease, transform 0.15s ease;
      overflow: hidden;
    }
    #card-detail.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Header */
    .cd-header {
      background: linear-gradient(90deg, color-mix(in srgb, var(--rarity-color, #3a3a6a) 22%, #0a0a1e), #0a0a1e);
      border-bottom: 1px solid color-mix(in srgb, var(--rarity-color, #3a3a6a) 45%, transparent);
      padding: 9px 11px 8px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .cd-icon { font-size: 1.25rem; line-height: 1; }
    .cd-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #e8eeff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 10px color-mix(in srgb, var(--rarity-color, #ffffff) 60%, transparent);
    }

    /* Rarity line */
    .cd-rarity-line {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px 4px;
    }
    .cd-gem {
      font-size: 0.65rem;
      color: var(--rarity-color, #7a8fa0);
      filter: drop-shadow(0 0 4px var(--rarity-color, #7a8fa0));
    }
    .cd-rarity-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rarity-color, #7a8fa0);
    }

    /* Dividers */
    .cd-divider {
      border: none;
      border-top: 1px solid rgba(100,100,180,0.18);
      margin: 0 11px;
    }

    /* Type line */
    .cd-type {
      padding: 5px 11px 4px;
      font-size: 0.62rem;
      font-style: italic;
      color: #7788aa;
      letter-spacing: 0.05em;
    }

    /* Effect text */
    .cd-effect {
      padding: 7px 11px 8px;
      font-size: 0.67rem;
      line-height: 1.55;
      color: #c8d4e8;
    }
    .cd-effect b {
      color: #e8eeff;
      font-weight: 700;
    }

    /* Stat bar */
    .cd-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 11px 9px;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid rgba(100,100,180,0.18);
    }
    .cd-atk { font-size: 0.72rem; color: #e84d6a; font-weight: 600; }
    .cd-hp  { font-size: 0.72rem; color: #4deca8; font-weight: 600; }
    .cd-cost { font-size: 0.72rem; color: #00ccff; font-weight: 600; }
    .cd-atk b, .cd-hp b, .cd-cost b { font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="vignette"></div>

<!-- Scene switcher -->
<div id="scene-switcher">
  <button class="scene-btn active"        onclick="window.location.href='battle.html?map=sand-arena'">🏰 Sand Arena</button>
  <button class="scene-btn"               onclick="window.location.href='battle.html?map=dark-fantasy'">🔥 Dark Fantasy</button>
</div>

<!-- Turn indicator (top-center) -->
<div id="turn-indicator" style="
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  padding:8px 20px; background:rgba(0,0,0,0.7); color:#fff;
  border-radius:20px; font-size:14px; z-index:100;
  font-family:'Segoe UI',sans-serif; pointer-events:none;
">Player Turn</div>

<!-- Player HP (bottom-left) -->
<div id="player-hp" style="
  position:absolute; bottom:20px; left:20px;
  padding:8px 16px; background:rgba(0,0,0,0.7); color:#2ecc71;
  border-radius:12px; font-size:16px; z-index:100;
  font-family:'Segoe UI',sans-serif; font-weight:bold;
">❤️ 20</div>

<!-- Enemy HP (top-left) -->
<div id="enemy-hp" style="
  position:absolute; top:60px; left:20px;
  padding:8px 16px; background:rgba(0,0,0,0.7); color:#e74c3c;
  border-radius:12px; font-size:16px; z-index:100;
  font-family:'Segoe UI',sans-serif; font-weight:bold;
">💀 20</div>

<!-- Game Over overlay (hidden by default) -->
<div id="gameover-overlay" style="
  display:none; position:absolute; inset:0;
  background:rgba(0,0,0,0.8); color:#fff;
  flex-direction:column; align-items:center; justify-content:center;
  z-index:200; font-family:'Segoe UI',sans-serif;
">
  <div id="gameover-text" style="font-size:48px; font-weight:bold; margin-bottom:24px;"></div>
  <button onclick="location.reload()" style="
    padding:12px 32px; background:#3498db; color:#fff;
    border:none; border-radius:8px; font-size:18px; cursor:pointer;
  ">Play Again</button>
</div>

<!-- UI overlay -->
<div id="ui">
  <!-- Turn / mana HUD -->
  <div id="turn-hud">
    <div id="mana-dots"></div>
    <button id="end-turn-btn" type="button">
      <span id="turn-badge">Turn 1</span>
      <span id="end-turn-label">End Turn</span>
    </button>
  </div>

  <!-- Drop zones injected by JS after 3D->2D projection -->
  <div id="hand">
    <div class="card" draggable="true"
      data-name="Fire Drake" data-icon="🐉" data-cost="3"
      data-rarity="Rare" data-type="Dragon · Fire" data-atk="4" data-hp="8"
      data-effect="&lt;b&gt;Inferno Strike:&lt;/b&gt; On summon, launch a fireball dealing 2 damage to the nearest enemy. &lt;b&gt;Dragon's Fury:&lt;/b&gt; Each attack has a 30% chance to strike all enemies for 1 bonus damage.">
      <span class="card-cost">3</span><span class="card-icon">🐉</span><span class="card-name">Fire Drake</span>
      <span class="card-atk">⚔ 4</span>
    </div>
    <div class="card" draggable="true"
      data-name="Blade Imp" data-icon="🗡️" data-cost="2"
      data-rarity="Uncommon" data-type="Fiend · Shadow" data-atk="5" data-hp="5"
      data-effect="&lt;b&gt;Rush:&lt;/b&gt; This monster may attack the same turn it is summoned. &lt;b&gt;Flurry:&lt;/b&gt; When this monster destroys an enemy unit, immediately draw 1 card.">
      <span class="card-cost">2</span><span class="card-icon">🗡️</span><span class="card-name">Blade Imp</span>
      <span class="card-atk">⚔ 5</span>
    </div>
    <div class="card" draggable="true"
      data-name="Tide Lord" data-icon="🌊" data-cost="4"
      data-rarity="Epic" data-type="Aqua · Water" data-atk="3" data-hp="10"
      data-effect="&lt;b&gt;Taunt:&lt;/b&gt; All enemy attacks must target this monster while it is on the field. &lt;b&gt;Tidal Regen:&lt;/b&gt; Restore 1 HP to this monster at the start of each of your turns.">
      <span class="card-cost">4</span><span class="card-icon">🌊</span><span class="card-name">Tide Lord</span>
      <span class="card-atk">⚔ 3</span>
    </div>
    <div class="card" draggable="true"
      data-name="Spore Kin" data-icon="🍄" data-cost="1"
      data-rarity="Common" data-type="Plant · Nature" data-atk="2" data-hp="7"
      data-effect="&lt;b&gt;Spore Burst:&lt;/b&gt; On summon, release toxic spores dealing 1 damage to all enemies for 2 turns. &lt;b&gt;Decompose:&lt;/b&gt; When destroyed, restore 3 HP to your hero.">
      <span class="card-cost">1</span><span class="card-icon">🍄</span><span class="card-name">Spore Kin</span>
      <span class="card-atk">⚔ 2</span>
    </div>
    <div class="card" draggable="true"
      data-name="Bone Giant" data-icon="💀" data-cost="5"
      data-rarity="Legendary" data-type="Undead · Dark" data-atk="6" data-hp="15"
      data-effect="&lt;b&gt;Indestructible:&lt;/b&gt; Cannot be destroyed by card effects — only combat damage can defeat this monster. &lt;b&gt;Soul Harvest:&lt;/b&gt; Each time a friendly monster is destroyed, permanently gain +1 ATK.">
      <span class="card-cost">5</span><span class="card-icon">💀</span><span class="card-name">Bone Giant</span>
      <span class="card-atk">⚔ 6</span>
    </div>
    <div class="card" draggable="true"
      data-name="Rally Banner" data-icon="🚩" data-cost="2"
      data-rarity="Uncommon" data-type="Effect · Buff" data-atk="—" data-hp="—"
      data-effect="&lt;b&gt;Rally:&lt;/b&gt; Instantly grants +2 ATK for 3 turns to every monster you currently control. Has no effect if you have no monsters on the field.">
      <span class="card-cost">2</span><span class="card-icon">🚩</span><span class="card-name">Rally Banner</span>
    </div>
  </div>
</div>


<!-- Card detail popup -->
<div id="card-detail" aria-hidden="true">
  <div class="cd-header">
    <span class="cd-icon"></span>
    <span class="cd-name"></span>
  </div>
  <div class="cd-rarity-line">
    <span class="cd-gem">◆</span>
    <span class="cd-rarity-label"></span>
  </div>
  <hr class="cd-divider">
  <div class="cd-type"></div>
  <hr class="cd-divider">
  <div class="cd-effect"></div>
  <hr class="cd-divider">
  <div class="cd-stats">
    <span class="cd-atk">⚔ ATK <b class="cd-atk-val"></b></span>
    <span class="cd-hp">♥ HP <b class="cd-hp-val"></b></span>
    <span class="cd-cost">● <b class="cd-cost-val"></b></span>
  </div>
</div>

<script>
(function () {
  const RARITY_COLOR = {
    Common:    '#7a8fa0',
    Uncommon:  '#4deca8',
    Rare:      '#4dd9ec',
    Epic:      '#a855f7',
    Legendary: '#c8a84b',
  };

  const panel      = document.getElementById('card-detail');
  const elIcon     = panel.querySelector('.cd-icon');
  const elName     = panel.querySelector('.cd-name');
  const elGem      = panel.querySelector('.cd-gem');
  const elRarity   = panel.querySelector('.cd-rarity-label');
  const elType     = panel.querySelector('.cd-type');
  const elEffect   = panel.querySelector('.cd-effect');
  const elAtk      = panel.querySelector('.cd-atk-val');
  const elHp       = panel.querySelector('.cd-hp-val');
  const elCost     = panel.querySelector('.cd-cost-val');

  let hideTimer = null;

  function show(card) {
    clearTimeout(hideTimer);

    const d = card.dataset;
    const color = RARITY_COLOR[d.rarity] || '#3a3a6a';

    panel.style.setProperty('--rarity-color', color);
    elIcon.textContent   = d.icon;
    elName.textContent   = d.name;
    elGem.style.color    = color;
    elGem.style.filter   = `drop-shadow(0 0 5px ${color})`;
    elRarity.textContent = (d.rarity || 'Common').toUpperCase();
    elRarity.style.color = color;
    elType.textContent   = d.type || '';
    elEffect.innerHTML   = d.effect || '';
    elAtk.textContent    = d.atk;
    elHp.textContent     = d.hp;
    elCost.textContent   = d.cost;

    // Position panel centered above the card
    const rect    = card.getBoundingClientRect();
    const pw      = 210;
    const PANEL_H = 310; // approximate panel height
    let left = rect.left + rect.width / 2 - pw / 2;
    left     = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
    panel.style.left = left + 'px';
    panel.style.top  = Math.max(8, rect.top - PANEL_H - 14) + 'px';
    panel.setAttribute('aria-hidden', 'false');
    panel.classList.add('visible');
  }

  function hide() {
    hideTimer = setTimeout(() => {
      panel.classList.remove('visible');
      panel.setAttribute('aria-hidden', 'true');
    }, 80);
  }

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mouseenter', () => show(card));
    card.addEventListener('mouseleave', hide);
    card.addEventListener('dragstart', hide);
  });

  document.getElementById('field-drop').addEventListener('drop', hide);
  document.addEventListener('dragend', hide);

  // Recalculate position on scroll/resize
  window.addEventListener('resize', () => {
    if (panel.classList.contains('visible')) panel.classList.remove('visible');
  });
})();
</script>
