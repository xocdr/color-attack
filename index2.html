<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Battle Arena</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }

    /* ── UI overlay ──────────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Field drop zone (full play area above the hand) ────────────────────── */
    #field-drop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 130px;
      pointer-events: none;
    }
    #field-drop.dragging {
      pointer-events: all;
    }
    #field-drop.drag-over {
      background: rgba(0, 255, 255, 0.04);
      outline: 2px dashed rgba(0, 255, 255, 0.25);
      outline-offset: -16px;
    }

    /* ── Hand container ──────────────────────────────────────────────────────── */
    #hand {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      pointer-events: all;
    }

    /* ── Individual card ─────────────────────────────────────────────────────── */
    .card {
      width: 4.5rem;
      height: 6.5rem;
      background: linear-gradient(160deg, #1e1e38 0%, #12122a 100%);
      border: 1.5px solid #3a3a6a;
      border-radius: 8px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #7777bb;
      font-family: sans-serif;
      font-size: 0.65rem;
      text-align: center;
      user-select: none;
    }
    .card + .card { margin-left: -1.4rem; }
    .card-icon { font-size: 1.6rem; opacity: 0.7; }
    .card-name { font-size: 0.6rem; color: #9999cc; letter-spacing: 0.03em; }
    .card-cost {
      position: absolute;
      top: 6px; left: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #00ccff;
    }
    .card:hover {
      transform: translateY(-18px) scale(1.08);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0, 180, 255, 0.35);
      border-color: #6688ff;
    }
    .card.dragging {
      opacity: 0.4;
      transform: translateY(-18px) scale(1.05);
      cursor: grabbing;
    }

    /* ── Deck (right side) ───────────────────────────────────────────────────── */
    #deck {
      position: fixed;
      bottom: 32px;
      right: 28px;
      width: 4.5rem;
      height: 6.5rem;
      pointer-events: all;
      cursor: pointer;
      z-index: 30;
    }
    .deck-card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('src/card-img/back.png') center/cover no-repeat;
      border: 1.5px solid #3a3a6a;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    /* stacked card offsets — bottom to top */
    .deck-card:nth-child(1) { transform: translate(4px, 4px); }
    .deck-card:nth-child(2) { transform: translate(2px, 2px); }
    .deck-card:nth-child(3) {
      transform: translateY(0);
      transition: transform 0.2s ease, border-color 0.2s ease, filter 0.2s ease;
    }
    .deck-count {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 0.6rem;
      color: #5566aa;
      font-family: sans-serif;
      font-weight: bold;
    }
    @keyframes deckTopPulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(120,140,255,0.5)); }
      50%       { filter: drop-shadow(0 0 18px rgba(160,100,255,0.9)); }
    }
    #deck:hover .deck-card:nth-child(3) {
      transform: translateY(-14px);
      border-color: #aa88ff;
      animation: deckTopPulse 0.9s ease-in-out infinite;
    }

    /* Scene switcher */
    #scene-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .scene-btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.55);
      color: #aaddcc;
      font-family: sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .scene-btn:hover {
      background: rgba(0,0,0,0.8);
      border-color: rgba(255,255,255,0.35);
      color: #ffffff;
    }
    .scene-btn.active {
      border-color: #44ffaa;
      color: #44ffaa;
      background: rgba(0,40,20,0.7);
    }

    /* Cinematic vignette */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.45) 80%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Deal animation — card slides up from below */
    @keyframes dealCard {
      from { transform: translateY(60px) scale(0.7); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }
    .card.dealing {
      animation: dealCard 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
</head>
<body>

<div id="vignette"></div>

<!-- Scene switcher -->
<div id="scene-switcher">
  <button class="scene-btn active"        onclick="window.location.href='index2.html?map=sand-arena'">🏰 Sand Arena</button>
  <button class="scene-btn"               onclick="window.location.href='index2.html?map=dark-fantasy'">🔥 Dark Fantasy</button>
</div>

<!-- UI overlay -->
<div id="ui">
  <!-- Drop zones injected by JS after 3D->2D projection -->
  <div id="hand">
    <div class="card" draggable="true" data-name="Fire Drake" data-icon="🐉" data-cost="3">
      <span class="card-cost">3</span><span class="card-icon">🐉</span><span class="card-name">Fire Drake</span>
    </div>
    <div class="card" draggable="true" data-name="Blade Imp" data-icon="🗡️" data-cost="2">
      <span class="card-cost">2</span><span class="card-icon">🗡️</span><span class="card-name">Blade Imp</span>
    </div>
    <div class="card" draggable="true" data-name="Tide Lord" data-icon="🌊" data-cost="4">
      <span class="card-cost">4</span><span class="card-icon">🌊</span><span class="card-name">Tide Lord</span>
    </div>
    <div class="card" draggable="true" data-name="Spore Kin" data-icon="🍄" data-cost="1">
      <span class="card-cost">1</span><span class="card-icon">🍄</span><span class="card-name">Spore Kin</span>
    </div>
    <div class="card" draggable="true" data-name="Bone Giant" data-icon="💀" data-cost="5">
      <span class="card-cost">5</span><span class="card-icon">💀</span><span class="card-name">Bone Giant</span>
    </div>
  </div>
</div>


<script type="importmap">
{
  "imports": {
    "three": "./node_modules/three/build/three.module.min.js",
    "three/addons/": "./node_modules/three/examples/jsm/"
  }
}
</script>

<script type="module" src="src/arena.js"></script>

</body>
</html>
