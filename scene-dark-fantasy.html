<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Battle Arena</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }

    /* ── UI overlay ──────────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Drop zones (projected over 3D player slots) ─────────────────────────── */
    .drop-zone {
      position: absolute;
      width: 68px;
      height: 96px;
      transform: translate(-50%, -50%);
      border: 2px dashed rgba(0, 255, 255, 0.35);
      border-radius: 8px;
      background: rgba(0, 255, 255, 0.04);
      pointer-events: all;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: rgba(0,255,255,0.3);
      font-family: sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .drop-zone.drag-over {
      border-color: rgba(0, 255, 255, 0.9);
      background: rgba(0, 255, 255, 0.15);
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow: 0 0 20px rgba(0,255,255,0.4);
      color: rgba(0,255,255,0.8);
    }
    .drop-zone.occupied {
      border-color: rgba(0, 200, 255, 0.6);
      background: rgba(0, 30, 60, 0.85);
      color: #cceeff;
    }
    .drop-zone .slot-icon  { font-size: 1.5rem; }
    .drop-zone .slot-name  { font-size: 0.58rem; color: #88ccff; font-weight: bold; }
    .drop-zone .slot-cost  { font-size: 0.5rem;  color: #00ccff; }

    /* ── Hand container ──────────────────────────────────────────────────────── */
    #hand {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      pointer-events: all;
    }

    /* ── Individual card ─────────────────────────────────────────────────────── */
    .card {
      width: 4.5rem;
      height: 6.5rem;
      background: linear-gradient(160deg, #1e1e38 0%, #12122a 100%);
      border: 1.5px solid #3a3a6a;
      border-radius: 8px;
      flex-shrink: 0;
      cursor: grab;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #7777bb;
      font-family: sans-serif;
      font-size: 0.65rem;
      text-align: center;
      user-select: none;
    }
    .card + .card { margin-left: -1.4rem; }
    .card-icon { font-size: 1.6rem; opacity: 0.7; }
    .card-name { font-size: 0.6rem; color: #9999cc; letter-spacing: 0.03em; }
    .card-cost {
      position: absolute;
      top: 6px; left: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #00ccff;
    }
    .card:hover {
      transform: translateY(-18px) scale(1.08);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0, 180, 255, 0.35);
      border-color: #6688ff;
    }
    .card.dragging {
      opacity: 0.4;
      transform: translateY(-18px) scale(1.05);
      cursor: grabbing;
    }

    /* Scene switcher */
    #scene-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .scene-btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.55);
      color: #ccaaaa;
      font-family: sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .scene-btn:hover {
      background: rgba(0,0,0,0.8);
      border-color: rgba(255,255,255,0.35);
      color: #ffffff;
    }
    .scene-btn.active {
      border-color: #ff6644;
      color: #ff6644;
      background: rgba(40,10,0,0.7);
    }

    /* Cinematic vignette */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.45) 80%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Deal animation — card slides up from below */
    @keyframes dealCard {
      from { transform: translateY(60px) scale(0.7); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }
    .card.dealing {
      animation: dealCard 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
</head>
<body>

<div id="vignette"></div>

<!-- Scene switcher -->
<div id="scene-switcher">
  <button class="scene-btn"        onclick="window.location.href='index2.html'">🏰 Shadow Citadel</button>
  <button class="scene-btn active" onclick="window.location.href='scene-dark-fantasy.html'">🔥 Dark Fantasy</button>
</div>

<!-- UI overlay -->
<div id="ui">
  <!-- Drop zones injected by JS after 3D->2D projection -->
  <div id="hand">
    <div class="card" draggable="true" data-name="Fire Drake" data-icon="🐉" data-cost="3">
      <span class="card-cost">3</span><span class="card-icon">🐉</span><span class="card-name">Fire Drake</span>
    </div>
    <div class="card" draggable="true" data-name="Blade Imp" data-icon="🗡️" data-cost="2">
      <span class="card-cost">2</span><span class="card-icon">🗡️</span><span class="card-name">Blade Imp</span>
    </div>
    <div class="card" draggable="true" data-name="Tide Lord" data-icon="🌊" data-cost="4">
      <span class="card-cost">4</span><span class="card-icon">🌊</span><span class="card-name">Tide Lord</span>
    </div>
    <div class="card" draggable="true" data-name="Spore Kin" data-icon="🍄" data-cost="1">
      <span class="card-cost">1</span><span class="card-icon">🍄</span><span class="card-name">Spore Kin</span>
    </div>
    <div class="card" draggable="true" data-name="Bone Giant" data-icon="💀" data-cost="5">
      <span class="card-cost">5</span><span class="card-icon">💀</span><span class="card-name">Bone Giant</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>
  // ── Renderer ────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x140810);
  document.body.appendChild(renderer.domElement);

  // ── Scene ───────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();

  // ── Camera ──────────────────────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 5, 18);
  camera.lookAt(0, 1, 0);

  // ── Lighting ────────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x553344, 0.8));

  // Sunset directional light — warm orange from the horizon
  const sun = new THREE.DirectionalLight(0xff8844, 1.6);
  sun.position.set(-10, 6, -12);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  scene.add(sun);

  // Soft fill from above (cool purple counterlight)
  const fill = new THREE.DirectionalLight(0x442266, 0.5);
  fill.position.set(5, 14, 5);
  scene.add(fill);

  // ── Sky sphere ──────────────────────────────────────────────────────────────
  (function buildSky() {
    const skyGeo = new THREE.SphereGeometry(120, 32, 16);
    // Manually color vertices: orange at horizon, deep purple at top
    const colors = [];
    const pos = skyGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      const t = Math.max(0, Math.min(1, (y + 30) / 120));
      // lerp from horizon orange (1,0.35,0.1) to zenith purple (0.08,0.04,0.18)
      colors.push(
        1 * (1 - t) + 0.08 * t,
        0.35 * (1 - t) + 0.04 * t,
        0.10 * (1 - t) + 0.18 * t
      );
    }
    skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const skyMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
    scene.add(new THREE.Mesh(skyGeo, skyMat));
  })();

  // ── Clouds ──────────────────────────────────────────────────────────────────
  const clouds = [];
  const cloudMat = new THREE.MeshBasicMaterial({ color: 0x2a1030, transparent: true, opacity: 0.35, depthWrite: false });
  for (let i = 0; i < 10; i++) {
    const g = new THREE.Group();
    const numPuffs = 3 + Math.floor(Math.random() * 3);
    for (let p = 0; p < numPuffs; p++) {
      const puff = new THREE.Mesh(
        new THREE.SphereGeometry(2.5 + Math.random() * 2, 7, 5),
        cloudMat.clone()
      );
      puff.position.set(p * 3.5 + (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 1.2, 0);
      puff.scale.y = 0.4 + Math.random() * 0.2;
      g.add(puff);
    }
    g.position.set((Math.random() - 0.5) * 160, 28 + Math.random() * 18, -30 - Math.random() * 60);
    scene.add(g);
    clouds.push({ group: g, speed: 0.01 + Math.random() * 0.015 });
  }

  // ── Lightning ────────────────────────────────────────────────────────────────
  const lightningLight = new THREE.PointLight(0xaaaaff, 0, 200);
  lightningLight.position.set(0, 60, -80);
  scene.add(lightningLight);
  let lightningTimer = 3 + Math.random() * 5;

  // ── Floating debris ──────────────────────────────────────────────────────────
  const DEBRIS_COUNT = 60;
  const debrisPositions = new Float32Array(DEBRIS_COUNT * 3);
  const debrisData = [];
  for (let i = 0; i < DEBRIS_COUNT; i++) {
    debrisData.push({
      x: (Math.random() - 0.5) * 26,
      y: Math.random() * 6,
      z: (Math.random() - 0.5) * 26,
      vy: 0.005 + Math.random() * 0.012,
      vx: (Math.random() - 0.5) * 0.004,
      vz: (Math.random() - 0.5) * 0.004,
      maxY: 5 + Math.random() * 8,
    });
    debrisPositions[i * 3]     = debrisData[i].x;
    debrisPositions[i * 3 + 1] = debrisData[i].y;
    debrisPositions[i * 3 + 2] = debrisData[i].z;
  }
  const debrisGeo = new THREE.BufferGeometry();
  debrisGeo.setAttribute('position', new THREE.BufferAttribute(debrisPositions, 3));
  const debrisMat = new THREE.PointsMaterial({ color: 0x554433, size: 0.08, transparent: true, opacity: 0.6, depthWrite: false });
  scene.add(new THREE.Points(debrisGeo, debrisMat));

  // ── Floor ───────────────────────────────────────────────────────────────────
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(28, 28),
    new THREE.MeshStandardMaterial({ color: 0x1a1018, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  scene.add(new THREE.GridHelper(28, 28, 0x442233, 0x221122));

  // Arrays for animated fire objects
  const flames      = [];
  const torchLights = [];

  // ── Stone pillars ────────────────────────────────────────────────────────────
  (function buildPillars() {
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x2a1f2a, roughness: 0.9 });
    const capMat    = new THREE.MeshStandardMaterial({ color: 0x3a2a38, roughness: 0.85 });
    const positions = [[-12, 0, -8], [12, 0, -8], [-12, 0, 4], [12, 0, 4]];
    positions.forEach(([x, , z], idx) => {
      // Shaft
      const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 7, 8), pillarMat);
      shaft.position.set(x, 3.5, z);
      shaft.castShadow = true;
      scene.add(shaft);
      // Capital (top block)
      const cap = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 1.6), capMat);
      cap.position.set(x, 7.25, z);
      scene.add(cap);
      // Base block
      const base = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 1.8), capMat);
      base.position.set(x, 0.2, z);
      scene.add(base);
      // Torch point light
      const torchLight = new THREE.PointLight(0xff5500, 1.2, 10);
      torchLight.position.set(x, 8, z);
      scene.add(torchLight);
      torchLights.push({ light: torchLight, baseIntensity: 1.2, phase: idx * 1.3 });
      // Flame mesh
      const flame = new THREE.Mesh(
        new THREE.ConeGeometry(0.12, 0.4, 6),
        new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 2, transparent: true })
      );
      flame.position.set(x, 7.8, z);
      scene.add(flame);
      flames.push({ mesh: flame, baseX: x, baseZ: z, phase: idx * 0.9 });
    });
  })();

  // ── Distant mountains (silhouette) ───────────────────────────────────────────
  (function buildMountains() {
    const mtMat = new THREE.MeshStandardMaterial({ color: 0x1a0d1a, roughness: 1 });
    const peaks = [
      [-40, -18], [-25, -22], [-10, -18], [5, -24],
      [20, -18],  [35, -22],  [50, -16],
    ];
    peaks.forEach(([x, z]) => {
      const h = 10 + Math.random() * 8;
      const mt = new THREE.Mesh(new THREE.ConeGeometry(5 + Math.random() * 3, h, 5), mtMat);
      mt.position.set(x, h / 2 - 1, z);
      scene.add(mt);
    });
  })();

  // ── Ground fog plane ─────────────────────────────────────────────────────────
  const fog = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshBasicMaterial({ color: 0x330d22, transparent: true, opacity: 0.18, depthWrite: false })
  );
  fog.rotation.x = -Math.PI / 2;
  fog.position.y = 0.05;
  scene.add(fog);

  // ── Fog of war — drifting mist layers from the enemy side ───────────────────
  const fogLayers = [];
  const fogMat = new THREE.MeshBasicMaterial({
    color: 0x220d2a, transparent: true, opacity: 0.22,
    depthWrite: false, side: THREE.DoubleSide,
  });
  for (let i = 0; i < 6; i++) {
    const f = new THREE.Mesh(new THREE.PlaneGeometry(32, 10), fogMat.clone());
    f.rotation.x = -Math.PI / 2;
    f.position.set((Math.random() - 0.5) * 8, 0.08 + i * 0.12, -6 + (Math.random() - 0.5) * 4);
    f.material.opacity = 0.1 + Math.random() * 0.18;
    scene.add(f);
    fogLayers.push({ mesh: f, speed: 0.003 + Math.random() * 0.004, offset: Math.random() * Math.PI * 2 });
  }

  // ── Arena boundary walls — crumbling stone along left & right edges ───────────
  (function buildWalls() {
    const stoneMat    = new THREE.MeshStandardMaterial({ color: 0x1e1420, roughness: 1 });
    const darkMat     = new THREE.MeshStandardMaterial({ color: 0x150d18, roughness: 1 });

    // Broken wall segments along X edges (left = -13, right = +13)
    [-13, 13].forEach(sx => {
      // Main low wall runs
      [-6, -2, 2, 6].forEach(sz => {
        const h = 0.8 + Math.random() * 1.4;
        const w = 1.2 + Math.random() * 0.8;
        const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.6), stoneMat);
        wall.position.set(sx, h / 2, sz);
        wall.rotation.y = (Math.random() - 0.5) * 0.15;
        wall.castShadow = true;
        scene.add(wall);
      });

      // Broken pillar stumps
      [-9, 0, 9].forEach(sz => {
        const h = 1.5 + Math.random() * 2.5;
        const stump = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.38, h, 7), darkMat);
        stump.position.set(sx + (Math.random() - 0.5) * 0.4, h / 2, sz);
        stump.rotation.y = Math.random() * Math.PI;
        stump.castShadow = true;
        scene.add(stump);
        // Rubble chunks beside each stump
        for (let r = 0; r < 3; r++) {
          const rs = 0.1 + Math.random() * 0.2;
          const chunk = new THREE.Mesh(new THREE.BoxGeometry(rs, rs, rs), stoneMat);
          chunk.position.set(
            sx + (Math.random() - 0.5) * 1.2,
            rs / 2,
            sz + (Math.random() - 0.5) * 1.2
          );
          chunk.rotation.set(Math.random(), Math.random(), Math.random());
          scene.add(chunk);
        }
      });
    });
  })();

  // ── Battle cracks — glowing fissures across the centre dividing line ─────────
  (function buildCracks() {
    const crackMat = new THREE.MeshStandardMaterial({
      color: 0xff3300, emissive: 0xff2200, emissiveIntensity: 1.5,
      transparent: true, opacity: 0.85, depthWrite: false,
    });
    // Main centre crack
    const main = new THREE.Mesh(new THREE.PlaneGeometry(18, 0.06), crackMat);
    main.rotation.x = -Math.PI / 2;
    main.position.set(0, 0.02, -1);
    scene.add(main);

    // Branching fissures
    const branches = [
      { x: -6,  z: -1, w: 4,    rot: 0.3  },
      { x:  5,  z: -1, w: 3.5,  rot: -0.4 },
      { x: -2,  z: -1, w: 2.5,  rot: 0.8  },
      { x:  3,  z: -1, w: 2,    rot: -0.9 },
      { x: -8,  z: -1, w: 1.5,  rot: 0.6  },
      { x:  7,  z: -1, w: 2,    rot: 0.5  },
    ];
    branches.forEach(b => {
      const m = crackMat.clone();
      m.opacity = 0.5 + Math.random() * 0.3;
      const crack = new THREE.Mesh(new THREE.PlaneGeometry(b.w, 0.04), m);
      crack.rotation.x = -Math.PI / 2;
      crack.rotation.z = b.rot; // note: applied after x rotation via group
      const g = new THREE.Group();
      g.add(crack);
      g.position.set(b.x, 0.02, b.z);
      g.rotation.y = b.rot;
      scene.add(g);
    });

    // Glow light rising from the main crack
    const crackLight = new THREE.PointLight(0xff2200, 0.8, 8);
    crackLight.position.set(0, 0.5, -1);
    scene.add(crackLight);
    // Store for animation
    fogLayers.push({ isCrackLight: true, light: crackLight, baseIntensity: 0.8 });
  })();

  // ── Ember particle system ────────────────────────────────────────────────────
  const EMBER_COUNT   = 180;
  const TORCH_ORIGINS = [[-12, 8, -8], [12, 8, -8], [-12, 8, 4], [12, 8, 4]];

  const emberPositions = new Float32Array(EMBER_COUNT * 3);
  const emberData      = []; // per-particle state

  for (let i = 0; i < EMBER_COUNT; i++) {
    const origin = TORCH_ORIGINS[i % TORCH_ORIGINS.length];
    emberData.push({
      ox: origin[0], oy: origin[1], oz: origin[2],
      x:  origin[0] + (Math.random() - 0.5) * 0.4,
      y:  origin[1] + Math.random() * 3,
      z:  origin[2] + (Math.random() - 0.5) * 0.4,
      vx: (Math.random() - 0.5) * 0.02,
      vy: 0.02 + Math.random() * 0.04,
      vz: (Math.random() - 0.5) * 0.02,
      life:    Math.random(),        // 0-1, resets at 1
      maxLife: 0.6 + Math.random() * 0.8,
    });
    emberPositions[i * 3]     = emberData[i].x;
    emberPositions[i * 3 + 1] = emberData[i].y;
    emberPositions[i * 3 + 2] = emberData[i].z;
  }

  const emberGeo = new THREE.BufferGeometry();
  emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPositions, 3));

  const emberMat = new THREE.PointsMaterial({
    color: 0xff6600, size: 0.1, transparent: true,
    opacity: 0.85, depthWrite: false, sizeAttenuation: true,
  });

  const embers = new THREE.Points(emberGeo, emberMat);
  scene.add(embers);

  // ── Slot positions ──────────────────────────────────────────────────────────
  const PLAYER_POSITIONS = [[-6,0,2], [-3,0,2], [0,0,2], [3,0,2], [6,0,2]];
  const ENEMY_POSITIONS  = [[-3,0,-4],[0,0,-4],[3,0,-4]];

  const ringGeo = new THREE.RingGeometry(0.55, 0.85, 48);

  function mat(color, emissive, intensity = 0.3) {
    return new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: intensity });
  }
  function mesh(geo, m) { const o = new THREE.Mesh(geo, m); o.castShadow = true; return o; }

  // ── Monster builders ────────────────────────────────────────────────────────

  // 🐉 Fire Drake — winged dragon body
  function makeFireDrake() {
    const g = new THREE.Group();
    // body
    const body = mesh(new THREE.SphereGeometry(0.32, 8, 6), mat(0xff4400, 0xdd2200));
    body.scale.set(1, 1.5, 1); body.position.y = 0.65; g.add(body);
    // neck
    const neck = mesh(new THREE.CylinderGeometry(0.12, 0.18, 0.35, 7), mat(0xff5500, 0xcc2200));
    neck.position.set(0.18, 1.1, 0); neck.rotation.z = -0.4; g.add(neck);
    // head
    const head = mesh(new THREE.SphereGeometry(0.2, 8, 6), mat(0xff5500, 0xcc2200));
    head.position.set(0.4, 1.32, 0); g.add(head);
    // snout
    const snout = mesh(new THREE.ConeGeometry(0.08, 0.22, 6), mat(0xff6600, 0xdd3300));
    snout.rotation.z = -Math.PI / 2; snout.position.set(0.62, 1.28, 0); g.add(snout);
    // left wing
    const wL = mesh(new THREE.ConeGeometry(0.38, 0.7, 3), mat(0xcc1100, 0x880000, 0.2));
    wL.rotation.set(0.2, 0, -0.7); wL.position.set(-0.42, 1.0, 0); g.add(wL);
    // right wing
    const wR = wL.clone(); wR.rotation.z = 0.7; wR.position.set(0.1, 1.0, 0); g.add(wR);
    // tail
    const tail = mesh(new THREE.CylinderGeometry(0.04, 0.13, 0.55, 6), mat(0xff4400, 0xcc2200));
    tail.rotation.z = 0.9; tail.position.set(-0.52, 0.28, 0); g.add(tail);
    // legs
    [-0.15, 0.15].forEach(ox => {
      const leg = mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.38, 6), mat(0xdd3300, 0xaa1100));
      leg.position.set(ox, 0.19, 0); g.add(leg);
    });

  }

  // 🗡️ Blade Imp — small horned imp with sword
  function makeBladeImp() {
    const g = new THREE.Group();
    // body
    const body = mesh(new THREE.SphereGeometry(0.28, 8, 6), mat(0x662299, 0x441166));
    body.scale.set(1, 1.2, 1); body.position.y = 0.55; g.add(body);

    const head = mesh(new THREE.SphereGeometry(0.22, 8, 6), mat(0x7733aa, 0x441166));

    [-0.12, 0.12].forEach(ox => {
      const horn = mesh(new THREE.ConeGeometry(0.05, 0.28, 5), mat(0xddaaff, 0x9944cc, 0.4));

    // eyes
    [-0.08, 0.08].forEach(ox => {

    // sword blade
    const blade = mesh(new THREE.BoxGeometry(0.06, 0.7, 0.04), mat(0xccddff, 0x8899ff, 0.5));
    blade.position.set(0.42, 0.75, 0); blade.rotation.z = 0.3; g.add(blade);
    // sword guard
    const guard = mesh(new THREE.BoxGeometry(0.22, 0.06, 0.06), mat(0xaaaaaa, 0x666666));

    // arms
    const armR = mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.35, 6), mat(0x6622aa, 0x441166));
    armR.rotation.z = -0.6; armR.position.set(0.32, 0.7, 0); g.add(armR);
    const armL = mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.32, 6), mat(0x6622aa, 0x441166));
    armL.rotation.z = 0.7; armL.position.set(-0.3, 0.68, 0); g.add(armL);
    // legs
    [-0.12, 0.12].forEach(ox => {
      const leg = mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.38, 6), mat(0x5511aa, 0x330088));
      leg.position.set(ox, 0.19, 0); g.add(leg);
    });
    return g;
  }

  // 🌊 Tide Lord — robed aquatic figure with crown
  function makeTideLord() {
    const g = new THREE.Group();
    // robe / body
    const robe = mesh(new THREE.CylinderGeometry(0.15, 0.42, 0.9, 8), mat(0x0055cc, 0x002299));
    robe.position.y = 0.45; g.add(robe);
    // torso
    const torso = mesh(new THREE.SphereGeometry(0.26, 8, 6), mat(0x0066dd, 0x003399));
    torso.scale.set(1, 1.1, 1); torso.position.y = 1.0; g.add(torso);
    // head
    const head = mesh(new THREE.SphereGeometry(0.2, 8, 6), mat(0x0077ee, 0x0033aa));
    head.position.y = 1.42; g.add(head);
    // crown spikes
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      const spike = mesh(new THREE.ConeGeometry(0.04, 0.2, 5), mat(0x00ddff, 0x00aacc, 0.8));
      spike.position.set(Math.cos(a) * 0.17, 1.68, Math.sin(a) * 0.17); g.add(spike);
    }
    // tentacle arms
    [-1, 1].forEach(side => {
      const arm = mesh(new THREE.CylinderGeometry(0.04, 0.08, 0.5, 6), mat(0x0044bb, 0x002288));
      arm.rotation.z = side * 1.1; arm.position.set(side * 0.4, 0.98, 0); g.add(arm);
      const tip = mesh(new THREE.SphereGeometry(0.07, 6, 6), mat(0x00aaff, 0x0066cc, 0.5));
      tip.position.set(side * 0.68, 0.72, 0); g.add(tip);
    });
    // eyes
    [-0.07, 0.07].forEach(ox => {
      const eye = mesh(new THREE.SphereGeometry(0.04, 6, 6), mat(0x00ffff, 0x00ffff, 1));
      eye.position.set(ox, 1.44, 0.17); g.add(eye);
    });
    return g;
  }

  // 🍄 Spore Kin — mushroom creature
  function makeSporeKin() {
    const g = new THREE.Group();
    // stubby legs
    [-0.13, 0.13].forEach(ox => {
      const leg = mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.3, 6), mat(0xddccaa, 0xaa9966));
      leg.position.set(ox, 0.15, 0); g.add(leg);
    });
    // stem
    const stem = mesh(new THREE.CylinderGeometry(0.16, 0.2, 0.7, 8), mat(0xeeddbb, 0xbbaa88));

    // cap
    const cap = mesh(new THREE.SphereGeometry(0.45, 10, 7), mat(0xcc2211, 0x991100));
    cap.scale.set(1, 0.65, 1); cap.position.y = 1.08; g.add(cap);
    // cap underside
    const under = mesh(new THREE.CylinderGeometry(0.42, 0.12, 0.12, 10), mat(0xffeecc, 0xddbb88));
    under.position.y = 0.88; g.add(under);
    // white spots on cap
    [[-0.18,1.22,0.28],[0.2,1.25,0.18],[-0.05,1.3,-0.25],[0.22,1.15,-0.2],[-0.28,1.12,-0.1]].forEach(([x,y,z]) => {
      const spot = mesh(new THREE.SphereGeometry(0.06, 6, 6), mat(0xffffff, 0xdddddd, 0.1));
      spot.position.set(x,y,z); g.add(spot);
    });
    // eyes
    [-0.1, 0.1].forEach(ox => {
      const eye = mesh(new THREE.SphereGeometry(0.05, 6, 6), mat(0x22ff44, 0x00ff22, 1));
      eye.position.set(ox, 0.72, 0.17); g.add(eye);

    return g;

  // 💀 Bone Giant — tall skeletal warrior
  function makeBoneGiant() {
    const g = new THREE.Group();
    const bone = mat(0xeeeedd, 0xbbbbaa, 0.15);
    // legs
    [-0.18, 0.18].forEach(ox => {
      const upper = mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.5, 6), bone);
      upper.position.set(ox, 0.25, 0); g.add(upper);
      const lower = mesh(new THREE.CylinderGeometry(0.055, 0.07, 0.45, 6), bone);
      lower.position.set(ox, 0.65, 0.05); lower.rotation.x = 0.15; g.add(lower);
    });
    // pelvis
    const pelvis = mesh(new THREE.BoxGeometry(0.5, 0.14, 0.22), bone);
    pelvis.position.y = 0.52; g.add(pelvis);
    // spine
    for (let i = 0; i < 4; i++) {
      const vert = mesh(new THREE.SphereGeometry(0.07, 6, 5), bone);
      vert.position.y = 0.68 + i * 0.2; g.add(vert);
    }
    // ribs
    [-1, 1].forEach(side => {
      [0.82, 1.0, 1.18].forEach(y => {
        const rib = mesh(new THREE.TorusGeometry(0.19, 0.03, 5, 10, Math.PI), bone);
        rib.rotation.y = side > 0 ? 0 : Math.PI;
        rib.position.set(side * 0.04, y, 0); g.add(rib);
      });
    });
    // shoulders
    [-0.38, 0.38].forEach(ox => {
      const sh = mesh(new THREE.SphereGeometry(0.1, 7, 6), bone);
      sh.position.set(ox, 1.38, 0); g.add(sh);
      const arm = mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.5, 6), bone);
      arm.rotation.z = ox > 0 ? -0.5 : 0.5; arm.position.set(ox * 1.3, 1.16, 0); g.add(arm);
    });
    // skull
    const skull = mesh(new THREE.SphereGeometry(0.22, 8, 7), bone);
    skull.position.y = 1.68; g.add(skull);
    // jaw
    const jaw = mesh(new THREE.BoxGeometry(0.22, 0.1, 0.18), bone);
    jaw.position.set(0, 1.51, 0.04); g.add(jaw);
    // eye sockets
    [-0.08, 0.08].forEach(ox => {
      const socket = mesh(new THREE.SphereGeometry(0.06, 6, 6), mat(0x000000, 0x111111));
      socket.position.set(ox, 1.7, 0.17); g.add(socket);
      const glow = mesh(new THREE.SphereGeometry(0.035, 6, 6), mat(0x44ff44, 0x00ff00, 2));
      glow.position.set(ox, 1.7, 0.21); g.add(glow);
    });
    return g;
  }

  // Map card name → builder function
  const MONSTER_BY_NAME = {
    'Fire Drake':  makeFireDrake,
    'Blade Imp':   makeBladeImp,
    'Tide Lord':   makeTideLord,
    'Spore Kin':   makeSporeKin,
    'Bone Giant':  makeBoneGiant,
  };

  // Player slots — empty at start, monster + ring spawned on card drop
  // (nothing added to scene here)

  // Enemy slots — rings + cylinders always visible
  function addRing(x, z, color) {
    const ring = new THREE.Mesh(ringGeo,
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1.2, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(x, 0.01, z);
    scene.add(ring);
  }

  const enemyGeo = new THREE.CylinderGeometry(0.4, 0.4, 2, 16);
  ENEMY_POSITIONS.forEach(([x,,z]) => {
    addRing(x, z, 0xff2222);
    const body = new THREE.Mesh(enemyGeo,
      new THREE.MeshStandardMaterial({ color: 0xaa0022, emissive: 0xaa0022, emissiveIntensity: 0.25 }));
    body.position.set(x, 1, z);
    body.castShadow = true;
    scene.add(body);
  });

  // Track spawned monsters + deck for animation (declared here so buildDeck can use it)
  const activeMonsters = [];

  // ── 3D Deck ─────────────────────────────────────────────────────────────────
  (function buildDeck() {
    const DECK_X = 5, DECK_Z = 9;
    const deckGroup = new THREE.Group();

    const cardMat   = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, emissive: 0x1133aa, emissiveIntensity: 0.2 });
    const borderMat = new THREE.MeshStandardMaterial({ color: 0x3344cc, emissive: 0x2233bb, emissiveIntensity: 0.6 });
    const W = 1.4, H = 0.022, D = 1.9;

    for (let i = 0; i < 10; i++) {
      // Card body
      const card = new THREE.Mesh(new THREE.BoxGeometry(W, H, D), cardMat);
      card.position.set(
        (Math.random() - 0.5) * 0.04,
        i * H * 1.15,
        (Math.random() - 0.5) * 0.04
      );
      card.rotation.y = (Math.random() - 0.5) * 0.06;
      deckGroup.add(card);

      // Emissive border frame on top of each card
      const border = new THREE.Mesh(new THREE.BoxGeometry(W * 0.84, H * 0.5, D * 0.84), borderMat);
      border.position.set(card.position.x, card.position.y + H, card.position.z);
      border.rotation.y = card.rotation.y;
      deckGroup.add(border);
    }

    deckGroup.rotation.x = 0.1;
    deckGroup.position.set(DECK_X, 0, DECK_Z);
    deckGroup.userData.phase = 0.8;
    deckGroup.userData.baseY = 0;
    deckGroup.userData.isDeck = true;
    scene.add(deckGroup);
    activeMonsters.push(deckGroup);

    // Ground ring beneath deck
    const deckRing = new THREE.Mesh(
      new THREE.RingGeometry(0.85, 1.1, 48),
      new THREE.MeshStandardMaterial({ color: 0x3355ff, emissive: 0x2244ee, emissiveIntensity: 0.8, side: THREE.DoubleSide })
    );
    deckRing.rotation.x = -Math.PI / 2;
    deckRing.position.set(DECK_X, 0.01, DECK_Z);
    scene.add(deckRing);
  })();

  // ── Graveyard ────────────────────────────────────────────────────────────────
  (function buildGraveyard() {
    const GY_X = -5, GY_Z = 9;
    const gyGroup = new THREE.Group();

    // Fewer cards, more spread — like a discarded pile not a neat stack
    const cardMat   = new THREE.MeshStandardMaterial({ color: 0x1a0a0a, emissive: 0x550011, emissiveIntensity: 0.2 });
    const borderMat = new THREE.MeshStandardMaterial({ color: 0x661122, emissive: 0x440011, emissiveIntensity: 0.5 });
    const W = 1.4, H = 0.022, D = 1.9;

    for (let i = 0; i < 4; i++) {
      const card = new THREE.Mesh(new THREE.BoxGeometry(W, H, D), cardMat);
      // More chaotic spread than the deck
      card.position.set(
        (Math.random() - 0.5) * 0.3,
        i * H * 1.1,
        (Math.random() - 0.5) * 0.25
      );
      card.rotation.y = (Math.random() - 0.5) * 0.5; // messy rotation
      card.rotation.x = (Math.random() - 0.5) * 0.08;
      gyGroup.add(card);

      const border = new THREE.Mesh(new THREE.BoxGeometry(W * 0.84, H * 0.5, D * 0.84), borderMat);
      border.position.set(card.position.x, card.position.y + H, card.position.z);
      border.rotation.copy(card.rotation);
      gyGroup.add(border);
    }

    gyGroup.rotation.x = 0.08;
    gyGroup.position.set(GY_X, 0, GY_Z);
    gyGroup.userData.phase = 1.6;
    gyGroup.userData.baseY = 0;
    gyGroup.userData.isDeck = true;
    scene.add(gyGroup);
    activeMonsters.push(gyGroup);

    // Ground ring — dark purple/red for graveyard
    const gyRing = new THREE.Mesh(
      new THREE.RingGeometry(0.85, 1.1, 48),
      new THREE.MeshStandardMaterial({ color: 0x660022, emissive: 0x440011, emissiveIntensity: 0.8, side: THREE.DoubleSide })
    );
    gyRing.rotation.x = -Math.PI / 2;
    gyRing.position.set(GY_X, 0.01, GY_Z);
    scene.add(gyRing);
  })();

  // ── Project 3D position → 2D screen coords ──────────────────────────────────
  function toScreen(x, y, z) {
    const v = new THREE.Vector3(x, y, z).project(camera);
    return {
      x: ( v.x * 0.5 + 0.5) * window.innerWidth,
      y: (-v.y * 0.5 + 0.5) * window.innerHeight,
    };
  }

  // ── Build HTML drop zones over player slots ──────────────────────────────────
  const ui = document.getElementById('ui');
  const DROP_ZONE_Y = 2.2; // project high enough to clear the hand cards

  const dropZones = PLAYER_POSITIONS.map(([x, , z], i) => {
    const div = document.createElement('div');
    div.className = 'drop-zone';
    div.dataset.slotIndex = i;
    div.innerHTML = `<span style="font-size:1.1rem;opacity:0.4">＋</span><span>Place here</span>`;
    ui.appendChild(div);
    return div;
  });

  function updateDropZonePositions() {
    PLAYER_POSITIONS.forEach(([x, , z], i) => {
      const s = toScreen(x, DROP_ZONE_Y, z);
      dropZones[i].style.left = s.x + 'px';
      dropZones[i].style.top  = s.y + 'px';
    });
  }
  updateDropZonePositions();

  // ── Card pool (drawn when clicking deck) ─────────────────────────────────────
  const CARD_POOL = [
    { name: 'Fire Drake',  icon: '🐉', cost: 3 },
    { name: 'Blade Imp',   icon: '🗡️', cost: 2 },
    { name: 'Tide Lord',   icon: '🌊', cost: 4 },
    { name: 'Spore Kin',   icon: '🍄', cost: 1 },
    { name: 'Bone Giant',  icon: '💀', cost: 5 },
    { name: 'Storm Hawk',  icon: '⚡', cost: 3 },
    { name: 'Iron Golem',  icon: '🪨', cost: 4 },
    { name: 'Shadow Fox',  icon: '🦊', cost: 2 },
  ];

  // Flying card mesh — reused for each draw animation
  const flyCardMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, emissive: 0x1133aa, emissiveIntensity: 0.5 });
  const flyCardGeo  = new THREE.BoxGeometry(1.4, 0.022, 1.9);
  let   flyCard     = null; // active flying card
  let   flyProgress = 0;
  let   flyDuration = 0.7;  // seconds
  let   flyTarget   = null; // card data to add on arrival

  const deckWorldPos = new THREE.Vector3(5, 0.3, 9); // matches DECK_X/Z

  function startDrawAnimation(cardData) {
    if (flyCard) scene.remove(flyCard); // cancel any in-progress
    flyCard = new THREE.Mesh(flyCardGeo, flyCardMat);
    flyCard.position.copy(deckWorldPos);
    flyCard.rotation.x = 0.1;
    scene.add(flyCard);
    flyProgress = 0;
    flyTarget   = cardData;
  }

  function addCardToHand(cardData) {
    const div = document.createElement('div');
    div.className   = 'card dealing';
    div.draggable   = true;
    div.dataset.name = cardData.name;
    div.dataset.icon = cardData.icon;
    div.dataset.cost = String(cardData.cost);
    div.innerHTML = `
      <span class="card-cost">${cardData.cost}</span>
      <span class="card-icon">${cardData.icon}</span>
      <span class="card-name">${cardData.name}</span>
    `;
    // Wire up drag events
    div.addEventListener('dragstart', e => {
      dragData = { name: div.dataset.name, icon: div.dataset.icon, cost: div.dataset.cost, el: div };
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('animationend', () => div.classList.remove('dealing'));
    document.getElementById('hand').appendChild(div);
  }

  // ── Deck click via raycasting ─────────────────────────────────────────────────
  const raycaster  = new THREE.Raycaster();
  const mouse      = new THREE.Vector2();
  let   deckMeshes = []; // filled after deck is built — collected via scene traversal

  // Collect all meshes that belong to the deck group
  scene.traverse(obj => {
    if (obj.isMesh && obj.userData.isDeckCard) deckMeshes.push(obj);
  });

  // Tag deck card meshes during build — we do it here by re-traversing
  // (deck group was already added; find it by isDeck flag)
  scene.children.forEach(obj => {
    if (obj.isGroup && obj.userData.isDeck && obj.position.x > 0) {
      obj.traverse(child => { if (child.isMesh) child.userData.isDeckCard = true; });
      deckMeshes = obj.children.filter(c => c.isMesh);
    }
  });

  // Find the deck group for hover scaling
  let deckGroup = null;
  scene.children.forEach(obj => {
    if (obj.isGroup && obj.userData.isDeck && obj.position.x > 0) deckGroup = obj;
  });

  let deckHovered = false;

  renderer.domElement.addEventListener('mousemove', e => {
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(deckMeshes, false);
    const isOver = hits.length > 0;
    renderer.domElement.style.cursor = isOver ? 'pointer' : 'default';
    deckHovered = isOver;
  });

  renderer.domElement.addEventListener('click', e => {
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(deckMeshes, false);
    if (hits.length > 0) {
      const card = CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)];
      startDrawAnimation(card);
    }
  });

  // ── Drag & Drop ──────────────────────────────────────────────────────────────
  let dragData = null;

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragData = { name: card.dataset.name, icon: card.dataset.icon, cost: card.dataset.cost, el: card };
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
    });
  });

  // ── Drag ghost — transparent monster preview on hover ────────────────────────
  let ghostMonster = null;

  function showGhost(name, x, z) {
    removeGhost();
    const builder = MONSTER_BY_NAME[name];
    if (!builder) return;
    ghostMonster = builder();
    ghostMonster.position.set(x, 0, z);
    ghostMonster.traverse(child => {
      if (child.isMesh) {
        child.material = child.material.clone();
        child.material.transparent = true;
        child.material.opacity = 0.35;
      }
    });
    scene.add(ghostMonster);
  }

  function removeGhost() {
    if (ghostMonster) { scene.remove(ghostMonster); ghostMonster = null; }
  }

  // ── Graveyard fly-to animation ────────────────────────────────────────────────
  function flyToGraveyard(fromEl) {
    const fromRect = fromEl.getBoundingClientRect();
    const gyScreen = toScreen(-5, 0.3, 9); // graveyard world pos → screen

    const ghost = document.createElement('div');
    ghost.style.cssText = `
      position: fixed;
      width: ${fromRect.width}px; height: ${fromRect.height}px;
      left: ${fromRect.left}px; top: ${fromRect.top}px;
      background: #1a0a0a; border: 1px solid #661122;
      border-radius: 8px; pointer-events: none; z-index: 999;
      transition: left 0.5s cubic-bezier(0.4,0,0.2,1),
                  top  0.5s cubic-bezier(0.4,0,0.2,1),
                  transform 0.5s ease, opacity 0.5s ease;
    `;
    document.body.appendChild(ghost);

    requestAnimationFrame(() => {
      ghost.style.left      = gyScreen.x + 'px';
      ghost.style.top       = gyScreen.y + 'px';
      ghost.style.transform = 'scale(0.3) rotate(15deg)';
      ghost.style.opacity   = '0';
    });
    setTimeout(() => ghost.remove(), 550);
  }

  dropZones.forEach((zone, i) => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      if (zone.classList.contains('occupied')) return;
      zone.classList.add('drag-over');
      if (dragData) {
        const [x,,z] = PLAYER_POSITIONS[i];
        showGhost(dragData.name, x, z);
      }
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
      removeGhost();
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      removeGhost();
      if (!dragData || zone.classList.contains('occupied')) return;

      // Place card in slot
      zone.classList.add('occupied');
      zone.innerHTML = `
        <span class="slot-icon">${dragData.icon}</span>
        <span class="slot-name">${dragData.name}</span>
        <span class="slot-cost">Cost ${dragData.cost}</span>
      `;

      // Spawn ring + monster
      const [x,,z] = PLAYER_POSITIONS[i];
      addRing(x, z, 0x00ffff);
      const builder = MONSTER_BY_NAME[dragData.name];
      if (builder) {
        const monster = builder();
        monster.position.set(x, 0, z);
        monster.userData.phase = Math.random() * Math.PI * 2;

        const auraColors = {
          'Fire Drake': 0xff4400, 'Blade Imp':  0xaa00ff,
          'Tide Lord':  0x0088ff, 'Spore Kin':  0x44ff44,
          'Bone Giant': 0x00ff88,
        };
        const aura = new THREE.PointLight(auraColors[dragData.name] || 0xffffff, 1.0, 5);
        aura.position.set(0, 0.3, 0);
        monster.add(aura);
        monster.userData.aura = aura;
        scene.add(monster);
        activeMonsters.push(monster);
      }

      // Card flies to graveyard before disappearing
      flyToGraveyard(dragData.el);
      dragData.el.remove();
      dragData = null;
    });
  });


  // ── Resize ───────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    updateDropZonePositions();
  });

  // ── Render loop ──────────────────────────────────────────────────────────────
  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const t     = clock.elapsedTime;

    // Idle animation — gentle float + slow sway per monster
    activeMonsters.forEach(m => {
      const p     = m.userData.phase;
      const baseY = m.userData.baseY !== undefined ? m.userData.baseY : 0;
      const isDeck = m.userData.isDeck === true;
      if (isDeck) {
        m.position.y = baseY + Math.sin(t * 0.5 + p) * 0.03;
      } else {
        m.position.y = baseY + Math.sin(t * 1.4 + p) * 0.08;
        m.rotation.y = Math.sin(t * 0.6 + p) * 0.18;
        // Pulse aura light intensity
        if (m.userData.aura) {
          m.userData.aura.intensity = 0.8 + Math.sin(t * 2.2 + p) * 0.4;
        }
      }
    });

    // ── Animate clouds ───────────────────────────────────────────────────────────
    clouds.forEach(c => {
      c.group.position.x += c.speed;
      if (c.group.position.x > 100) c.group.position.x = -100;
    });

    // ── Lightning flashes ────────────────────────────────────────────────────────
    lightningTimer -= delta;
    if (lightningTimer <= 0) {
      lightningLight.intensity = 6 + Math.random() * 4;
      lightningLight.position.set((Math.random() - 0.5) * 80, 60, -80 - Math.random() * 40);
      setTimeout(() => { lightningLight.intensity = 0; }, 80 + Math.random() * 60);
      lightningTimer = 4 + Math.random() * 7;
    }

    // ── Floating debris ──────────────────────────────────────────────────────────
    const dp = debrisGeo.attributes.position.array;
    for (let i = 0; i < DEBRIS_COUNT; i++) {
      const d = debrisData[i];
      d.y += d.vy;
      d.x += d.vx;
      d.z += d.vz;
      if (d.y > d.maxY) { d.y = 0; d.x = (Math.random() - 0.5) * 26; d.z = (Math.random() - 0.5) * 26; }
      dp[i * 3] = d.x; dp[i * 3 + 1] = d.y; dp[i * 3 + 2] = d.z;
    }
    debrisGeo.attributes.position.needsUpdate = true;

    // ── Animate fog layers + crack light ────────────────────────────────────────
    fogLayers.forEach(fl => {
      if (fl.isCrackLight) {
        fl.light.intensity = fl.baseIntensity + Math.sin(t * 4.5) * 0.3;
      } else {
        fl.mesh.position.x += fl.speed;
        if (fl.mesh.position.x > 16) fl.mesh.position.x = -16;
        fl.mesh.material.opacity = 0.12 + Math.sin(t * 0.6 + fl.offset) * 0.07;
      }
    });

    // ── Animate flames ──────────────────────────────────────────────────────────
    flames.forEach(f => {
      const flicker = Math.sin(t * 12 + f.phase) * 0.08 + Math.sin(t * 7.3 + f.phase * 2) * 0.04;
      f.mesh.scale.set(1 + flicker, 1 + Math.abs(flicker) * 1.5, 1 + flicker);
      f.mesh.position.x = f.baseX + Math.sin(t * 5 + f.phase) * 0.03;
      f.mesh.position.z = f.baseZ + Math.cos(t * 4.3 + f.phase) * 0.03;
      f.mesh.material.emissiveIntensity = 1.8 + flicker * 3;
      f.mesh.material.opacity = 0.85 + flicker * 0.5;
    });

    // ── Flicker torch lights ─────────────────────────────────────────────────────
    torchLights.forEach(tl => {
      const flicker = Math.sin(t * 11 + tl.phase) * 0.3 + Math.sin(t * 6.7 + tl.phase * 1.5) * 0.15;
      tl.light.intensity = tl.baseIntensity + flicker;
    });

    // ── Update ember particles ───────────────────────────────────────────────────
    const pos = emberGeo.attributes.position.array;
    for (let i = 0; i < EMBER_COUNT; i++) {
      const p = emberData[i];
      p.life += delta / p.maxLife;
      if (p.life >= 1) {
        // Reset to torch origin with fresh velocity
        p.x = p.ox + (Math.random() - 0.5) * 0.3;
        p.y = p.oy;
        p.z = p.oz + (Math.random() - 0.5) * 0.3;
        p.vx = (Math.random() - 0.5) * 0.025;
        p.vy = 0.025 + Math.random() * 0.045;
        p.vz = (Math.random() - 0.5) * 0.025;
        p.life = 0;
        p.maxLife = 0.5 + Math.random() * 0.9;
      }
      // Drift upward with slight turbulence, fade and slow near end of life
      const fade = 1 - p.life;
      p.x += p.vx + Math.sin(t * 3 + i) * 0.002;
      p.y += p.vy * fade;
      p.z += p.vz + Math.cos(t * 2.5 + i) * 0.002;
      pos[i * 3]     = p.x;
      pos[i * 3 + 1] = p.y;
      pos[i * 3 + 2] = p.z;
    }
    emberGeo.attributes.position.needsUpdate = true;
    // Pulse ember opacity with overall fire flicker
    emberMat.opacity = 0.7 + Math.sin(t * 8) * 0.15;

    // ── Deck hover effect — smooth scale + emissive boost
    if (deckGroup) {
      const targetScale    = deckHovered ? 1.08 : 1.0;
      const targetEmissive = deckHovered ? 0.7  : 0.2;
      deckGroup.scale.x = deckGroup.scale.z = THREE.MathUtils.lerp(deckGroup.scale.x, targetScale, 0.1);
      deckGroup.scale.y = THREE.MathUtils.lerp(deckGroup.scale.y, targetScale, 0.1);
      deckGroup.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.emissiveIntensity = THREE.MathUtils.lerp(
            child.material.emissiveIntensity, targetEmissive, 0.1
          );
        }
      });
    }

    // Flying card draw animation (delta-time based)
    if (flyCard) {
      flyProgress = Math.min(flyProgress + delta / flyDuration, 1);

      // Smooth ease-in-out (smoothstep)
      const p    = flyProgress;
      const ease = p * p * (3 - 2 * p);

      flyCard.position.x = deckWorldPos.x * (1 - ease);
      flyCard.position.z = deckWorldPos.z + (camera.position.z - deckWorldPos.z) * ease * 0.55;
      flyCard.position.y = deckWorldPos.y + Math.sin(ease * Math.PI) * 3.0; // smooth arc
      flyCard.rotation.x = 0.1 + ease * (Math.PI * 0.55);                   // smooth flip
      flyCard.rotation.z = Math.sin(ease * Math.PI) * 0.15;                 // gentle wobble
      flyCard.scale.setScalar(1 + Math.sin(ease * Math.PI) * 0.25);         // scale breathe

      if (flyProgress >= 1) {
        scene.remove(flyCard);
        flyCard     = null;
        flyProgress = 0;
        addCardToHand(flyTarget);
        flyTarget = null;
      }
    }

    renderer.render(scene, camera);
  })();
</script>
